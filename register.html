<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>
  <link rel="stylesheet" href="css/register.css">
</head>
<body>
  
  <form action="">

    <legend> Join Us and Start Your Journey Today!</legend>
    <br>


    <label for="FullName">Full Name :</label>
    <input type="text" id="FullName" placeholder="e.g John Doe" required>
    <br><br>


    <label for="Email">Email Address :</label>
    <input type="email" id="Email" placeholder="e.g abc@gmail.com" required>
    <br><br>

    <label for="pwd">Password :</label>
    <input type="password" id="pwd" placeholder="type your password" required>
    <br><br>

    <label for="yob">Birthday: </label>
    <input type="date" id="yob" required>
    <br><br>

    <label for="dt">Date and Time: </label>
    <input type="datetime-local" id="dt" required>
    <br><br>

    <label for="file">Upload CV/Resume: </label>
    <input type="file" id="file" required>
    <br><br>

    <label for="Age">Age: </label>
    <input type="number" id="age" required>
    <br><br>

    <label for="nationality"> Select Nationality: </label>

    <!--Dropdown-->
    <select name="" id="nationality">
      <option value="" disabled>--Chose One--</option>
      <option value="">French</option>
      <option value="">Italian</option>
      <option value="">Spanish</option>

    </select>
    <!--End of Dropdown-->

    <br><br>


    <label for="gender">Select Gender</label>
     <br>
    <input type="radio" id="male" name="gender>
    <label for="male"> Male </label><br>
    
    <input type="radio" id="female" name="gender>
    <label for="female"> Female </label><br>

    <input type="radio" id="other" name="gender">
    <label for="other"> Other </label><br>
  <br><br>
<!--Example of checkbox-->
    <input type="checkbox" id="terms" required>
    <label for="terms"> I agree to the terms and conditions </label>
    <br><br>

<!--Example of textarea---->
    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="4" cols="50" placeholder="Write your message here..."></textarea>
  
  <br><br>
  <!--Example of Button-->
    <input type="submit" value="Register">
    <br><br>
  </form>

</body>
</html>
